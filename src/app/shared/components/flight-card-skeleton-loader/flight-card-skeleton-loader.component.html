@if (sharedService.screenWidth <= sharedService.webViewBreakPoint) {
  <div class="loader p-4">
    <div class="d-flex align-content-center mb-3 gap-3">
      <div class="skeleton" [ngStyle]="{ width: '50px', height: '40px', color: 'transparent', borderRadius: '10px' }">
        <p>Loading .......</p>
      </div>
      <div
        class="skeleton"
        [ngStyle]="{ width: '170px', height: '20px', color: 'transparent', marginTop: '10px', borderRadius: '10px' }"
      >
        <p>Loading .......</p>
      </div>
    </div>
    <div class="d-flex gap-5 mb-3">
      <div class="skeleton" [ngStyle]="{ width: '45px', height: '20px', color: 'transparent', borderRadius: '10px' }">
        <p>Loading .......</p>
      </div>
      <div class="skeleton" [ngStyle]="{ width: '45px', height: '20px', color: 'transparent', borderRadius: '10px' }">
        <p>Loading .......</p>
      </div>
    </div>
    <div
      class="skeleton"
      [ngStyle]="{
        width: '90%',
        color: 'transparent',
        marginRight: '10px',
        marginBottom: '10px',
        borderRadius: '10px',
      }"
    >
      <p>Loading .......</p>
    </div>
    <div
      class="skeleton"
      [ngStyle]="{
        width: '45%',
        color: 'transparent',
        marginRight: '10px',
        marginBottom: '10px',
        borderRadius: '10px',
      }"
    >
      <p>Loading .......</p>
    </div>
  </div>
} @else {
  <div class="skeleton-loader">
    <!-- Route -->
    <div class="skeleton-line wide" style="width: 80%; height: 24px; margin-bottom: 16px"></div>

    <!-- Airline -->
    <div class="skeleton-line" style="width: 60%; height: 20px; margin-bottom: 12px"></div>

    <!-- Flight times row -->
    <div class="skeleton-row mb-3">
      <div class="skeleton-circle" style="width: 40px; height: 40px"></div>
      <div class="skeleton-line" style="width: 30%; height: 16px"></div>
      <div class="skeleton-line" style="width: 20%; height: 16px"></div>
    </div>

    <!-- Flight duration -->
    <div class="skeleton-line center" style="width: 40%; height: 12px; margin: 8px auto"></div>

    <!-- Arrival time row -->
    <div class="skeleton-row mb-3">
      <div class="skeleton-line" style="width: 30%; height: 16px"></div>
      <div class="skeleton-line" style="width: 20%; height: 16px"></div>
      <div class="skeleton-circle" style="width: 40px; height: 40px"></div>
    </div>

    <!-- Baggage info -->
    <div class="skeleton-line" style="width: 50%; height: 14px; margin-top: 16px"></div>

    <!-- See more button -->
    <div class="skeleton-line" style="width: 120px; height: 16px; margin-top: 24px"></div>
  </div>
}
