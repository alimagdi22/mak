<section class="about-us-section">
  <!-- Loader -->
  @if (isLoading) {
    <div class="loader-container">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
  }

  <!-- Error Message -->
  @if (hasError && !isLoading) {
    <div class="alert alert-danger text-center">
      {{ errorMessage }}
      <button class="btn btn-sm btn-outline-danger ms-2" (click)="loadAboutUsContent()">
        {{ 'common.retry' | translate }}
      </button>
    </div>
  }

  <!-- Main Content -->
  @if (!isLoading && !hasError) {
    <div class="about-banner">
      <h1>{{ 'aboutUs.About Us' | translate }}</h1>
    </div>

    <div class="about-container container" [dir]="translate.currentLang === 'ar' ? 'rtl' : 'ltr'">
      <div class="about-images">
        <img src="assets/images/mountain.jpg" alt="About Image 1" />
        <img src="assets/images/sea.jpg" alt="About Image 2" />
      </div>

      <!-- CMS Content Section -->
      <div class="about-text" [innerHTML]="cmsContent"></div>
