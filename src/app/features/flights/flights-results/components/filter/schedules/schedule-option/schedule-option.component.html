<div class="schedule-option" [ngClass]="{ active: scheduleOption.isActive }">
  <img
    [src]="'assets/icons/' + scheduleOption.icon"
    [title]="'flight-result.' + scheduleOption.title | translate"
    class="schedule-option__icon"
  />
  <span class="schedule-option__title">{{ 'flight-result.' + scheduleOption.title | translate }}</span>
  <span class="schedule-option__time">{{ scheduleOption.startTime }} - {{ scheduleOption.endTime }}</span>
</div>
