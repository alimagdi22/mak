<div class="wrapper">
  <app-schedule-tab (scheduleTabChange)="onScheduleTabChange($event)" />

  <div class="text-wrapper">
    <span>{{ this.departCity }}</span>
    
    <img src="assets/icons/right-arrow-green-icon.svg" [class.flip-icon]="translateService.currentLang === 'ar'" title="Arrow" width="10px" />
    
    <span>{{ this.arrivalCity }}</span>
  </div>

  <div class="options">
    <app-schedule-option
      *ngFor="let scheduleOption of scheduleOptions"
      [scheduleOption]="scheduleOption"
      (click)="onSelectOption(scheduleOption)"
    />
  </div>
</div>
