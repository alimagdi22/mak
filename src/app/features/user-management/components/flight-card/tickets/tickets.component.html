<article class="d-flex flex-column justify-content-center align-items-center gap-4">
  <img src="assets/image/userPage/ticket-icon.svg" title="Ticket Icon" width="50" />

  <div>
    <p class="h4 text-center">Tickets</p>
    <p *ngFor="let ticket of tickets">{{ ticket.ticketNumber ?? '' }}</p>
  </div>

  <div class="d-flex gap-3">
    <button mat-flat-button color="primary" (click)="onClickCancel()">Cancel</button>
  </div>
</article>

<div class="background" (click)="onClickCancel()"></div>
