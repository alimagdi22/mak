<div
  class="py-3 mb-1 bg-white"
  [class.ps-3]="translate.currentLang === 'en'"
  [class.pe-3]="translate.currentLang === 'ar'"
>
  <span>{{ 'header.language' | translate }}</span>
  <mat-radio-group aria-label="Select an option" [(ngModel)]="selectLang" (change)="isLanguageChanged = true">
    <ul>
      <li>
        <div>
          <img src="assets/images/header/arabic.png" [class.ar]="translate.currentLang === 'ar'" />
          <span>العربيه</span>
        </div>

        <mat-radio-button value="ar"></mat-radio-button>
      </li>

      <li class="mt-3">
        <div>
          <img src="assets/images/header/english.png" [class.ar]="translate.currentLang === 'ar'" />
          <span>English</span>
        </div>

        <mat-radio-button value="en"></mat-radio-button>
      </li>
    </ul>
  </mat-radio-group>
</div>

<div class="px-4 py-3 mb-1 bg-white">
  <span>{{ 'header.currency' | translate }}</span>

  <div class="d-flex justify-content-between align-items-center mt-2">
    <span class="currency-btn" [matMenuTriggerFor]="currencyMenu" #currencyMenuTrigger="matMenuTrigger">
      {{ this.selectedCurrency['Currency_Name'] }}
      <img src="assets/icons/header/arrow-down.svg" />
    </span>

    <mat-menu #currencyMenu="matMenu">
      @for (currency of this.homePageService.allCurrency; track currency) {
        <button mat-menu-item (click)="updateCurrency(currency); $event.stopPropagation()">
          <img width="25" height="25" [src]="currency.Image_Url" title="Currency Icon" />
          {{ currency['Currency_Code'] }}
        </button>
      }
    </mat-menu>

    <span>{{ this.selectedCurrency['Currency_Code'] }}</span>
  </div>
</div>

<div class="d-flex justify-content-center py-2 bg-white">
  <button class="update-btn" (click)="onClickUpdate()">{{ 'header.update' | translate }}</button>
</div>
